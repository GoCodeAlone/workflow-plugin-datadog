version: 2

builds:
  - id: workflow-plugin-datadog
    main: ./cmd/workflow-plugin-datadog
    binary: workflow-plugin-datadog
    env:
      - CGO_ENABLED=0
      - GOPRIVATE=github.com/GoCodeAlone/*
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
